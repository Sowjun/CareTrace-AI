services:
  - type: web
    name: caretrace-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false  # Set in Render dashboard
      - key: POSTGRES_URI
        sync: false  # Optional — set in Render dashboard if Supabase is configured
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        sync: false  # Set to Vercel frontend URL
      - key: DB_NAME
        value: caretrace_ai
